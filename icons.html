<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wigo4it | Iconen</title>
  <link rel="stylesheet" href="styles/w4.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'light-grey': '#cfd6cc',
            'dark-green': '#005351',
            'dark-blue': '#434d8e',
            'soft-yellow': '#e9eb86',
            'light-green': '#63cf92',
            aubergine: '#362c46',
            'bright-red': '#f56e6d',
            'bright-pink': '#bb55a9'
          },
          fontFamily: {
            heading: ['"PP Neue Machina"', 'sans-serif'],
            body: ['Raleway', 'sans-serif']
          }
        }
      }
    };
  </script>
  <style>
    :root {
      --page-bg: #f5f8f4;
      --card-bg: #ffffff;
      --card-border: #d7ddd3;
      --card-shadow: 0 10px 26px rgba(54, 44, 70, 0.09);
      --text-muted: rgba(54, 44, 70, 0.7);
      --focus: #005351;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 88% 12%, rgba(233, 235, 134, 0.46), transparent 35%),
        radial-gradient(circle at 8% 80%, rgba(99, 207, 146, 0.22), transparent 38%),
        var(--page-bg);
      color: var(--aubergine);
      min-height: 100vh;
    }

    .page-shell {
      width: min(1200px, calc(100% - 3rem));
      margin: 5.5rem auto 0;
      padding-bottom: 4rem;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(8px);
      background: rgba(245, 248, 244, 0.88);
      border-bottom: 1px solid rgba(54, 44, 70, 0.09);
    }

    .topbar-inner {
      width: min(1200px, calc(100% - 3rem));
      margin: 0 auto;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.9rem;
      text-decoration: none;
      color: inherit;
      font-family: 'PP Neue Machina', sans-serif;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand img {
      width: 34px;
      height: 34px;
    }

    .back-link {
      text-decoration: none;
      color: var(--dark-green);
      font-weight: 700;
      border: 1px solid rgba(0, 83, 81, 0.28);
      border-radius: 999px;
      padding: 0.45rem 0.95rem;
      font-size: 0.92rem;
      transition: all 0.15s ease;
    }

    .back-link:hover {
      background: rgba(0, 83, 81, 0.08);
      border-color: rgba(0, 83, 81, 0.45);
    }

    .hero {
      padding: 3.2rem 0 2rem;
      display: grid;
      gap: 1.25rem;
    }

    h1 {
      margin: 0;
      font-family: 'PP Neue Machina', sans-serif;
      font-size: clamp(2rem, 5vw, 3.8rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
      max-width: 14ch;
    }

    .hero p {
      margin: 0;
      max-width: 60ch;
      color: var(--text-muted);
      font-size: clamp(0.95rem, 1.35vw, 1.12rem);
    }

    .toolbar {
      border: 1px solid var(--card-border);
      background: rgba(255, 255, 255, 0.78);
      border-radius: 18px;
      padding: 1rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.85rem;
      align-items: center;
      box-shadow: 0 10px 30px rgba(54, 44, 70, 0.06);
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      min-height: 46px;
      padding: 0.7rem 0.9rem;
      font-size: 1rem;
      font-family: 'Raleway', sans-serif;
      background: #ffffff;
      color: var(--aubergine);
    }

    .search-wrap input:focus {
      outline: 2px solid color-mix(in srgb, var(--focus) 24%, white);
      border-color: var(--focus);
    }

    .meta {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      font-size: 0.95rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .meta strong {
      font-family: 'PP Neue Machina', sans-serif;
      color: var(--aubergine);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .grid {
      margin-top: 1.2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 0.95rem;
    }

    .icon-card {
      border: 1px solid var(--card-border);
      border-radius: 16px;
      background: var(--card-bg);
      padding: 0.9rem;
      display: grid;
      gap: 0.8rem;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
    }

    .icon-card:hover {
      transform: translateY(-2px);
      border-color: rgba(0, 83, 81, 0.48);
      box-shadow: var(--card-shadow);
    }

    .icon-preview {
      height: 88px;
      border-radius: 12px;
      border: 1px solid rgba(54, 44, 70, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(45deg, rgba(207, 214, 204, 0.32) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(207, 214, 204, 0.32) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(207, 214, 204, 0.32) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(207, 214, 204, 0.32) 75%);
      background-size: 14px 14px;
      background-position: 0 0, 0 7px, 7px -7px, -7px 0;
      position: relative;
      overflow: hidden;
    }

    .icon-preview img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      filter: drop-shadow(0 2px 3px rgba(54, 44, 70, 0.14));
    }

    .icon-label {
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.25;
      word-break: break-word;
      min-height: 2.2em;
    }

    .icon-file {
      font-size: 0.75rem;
      color: var(--text-muted);
      word-break: break-word;
    }

    .empty {
      margin-top: 1.2rem;
      border: 1px dashed rgba(54, 44, 70, 0.35);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.55);
      padding: 1.1rem;
      color: var(--text-muted);
      display: none;
    }

    .toast {
      position: fixed;
      right: 1.4rem;
      bottom: 1.4rem;
      background: #1e2138;
      color: #ffffff;
      border-radius: 999px;
      padding: 0.6rem 0.9rem;
      font-size: 0.82rem;
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity 0.16s ease, transform 0.16s ease;
      z-index: 30;
    }

    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 840px) {
      .page-shell,
      .topbar-inner {
        width: min(1200px, calc(100% - 1.25rem));
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .meta {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <header class="fixed top-4 inset-x-0 z-50 flex justify-center pointer-events-none">
    <div class="pointer-events-auto bg-white/80 backdrop-blur-md border border-gray-100 shadow-sm rounded-2xl px-6 h-14 flex items-center justify-between gap-12 w-full max-w-3xl mx-4">
      <a href="index.html#merkboek" class="flex items-center gap-2 shrink-0">
        <img src="img/logo/Logo.svg" alt="Wigo4it" class="h-7" />
      </a>

      <nav aria-label="Hoofdnavigatie">
        <ul class="flex items-center gap-1">
          <li><a data-nav="merkboek" href="index.html#merkboek" class="font-body text-sm text-aubergine/70 hover:text-dark-green px-3 py-1.5 rounded-md hover:bg-light-grey/60 transition-colors">Merkboek</a></li>
          <li><a data-nav="design-system" href="design-system.html" class="font-body text-sm text-aubergine/70 hover:text-dark-green px-3 py-1.5 rounded-md hover:bg-light-grey/60 transition-colors">Design system</a></li>
          <li><a data-nav="icons" href="icons.html" class="font-body text-sm text-aubergine/70 hover:text-dark-green px-3 py-1.5 rounded-md hover:bg-light-grey/60 transition-colors">Iconen</a></li>
          <li><a data-nav="shapes" href="shapes.html" class="font-body text-sm text-aubergine/70 hover:text-dark-green px-3 py-1.5 rounded-md hover:bg-light-grey/60 transition-colors">Vormen</a></li>
          <li><a data-nav="voorbeelden" href="examples.html" class="font-body text-sm text-aubergine/70 hover:text-dark-green px-3 py-1.5 rounded-md hover:bg-light-grey/60 transition-colors">Voorbeelden</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="page-shell" id="iconen">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Iconenoverzicht</h1>
      <p>
        Overzicht van alle iconen uit de set. Zoek op naam en klik op een kaart om het pad te kopieren.
      </p>
    </section>

    <section aria-label="Iconen catalogus">
      <div class="toolbar">
        <label class="search-wrap" for="icon-search">
          <input id="icon-search" type="search" placeholder="Zoek iconen, bijvoorbeeld: auto, zon, game" autocomplete="off" />
        </label>
        <div class="meta">
          <strong id="icon-count">0</strong>
          <span>zichtbaar</span>
          <span>| totaal <span id="icon-total">0</span></span>
        </div>
      </div>

      <div id="icon-grid" class="grid"></div>
      <p id="empty-state" class="empty">Geen iconen gevonden voor deze zoekterm.</p>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite">Gekopieerd</div>

  <script>
    const iconFiles = [
      'Aarde.svg',
      'Alarm.svg',
      'Auto.svg',
      'Bier.svg',
      'Bliksem.svg',
      'Bom.svg',
      'Boot.svg',
      'Diamant.svg',
      'Drop.svg',
      'Duckie.svg',
      'Eek.svg',
      'Elixir.svg',
      'Fiets Px.svg',
      'Formidabel.svg',
      'Game Boy.svg',
      'Game Over.svg',
      'Hart.svg',
      'Hi5.svg',
      'Ijsje.svg',
      'Invasion.svg',
      'Kaars.svg',
      'Koffie.svg',
      'Laptop.svg',
      'Pacman.svg',
      'Paraplu.svg',
      'Pilon.svg',
      'Pin.svg',
      'Potlood.svg',
      'Prullenbak.svg',
      'Regen.svg',
      'Rex 2.svg',
      'Rex.svg',
      'Rocket.svg',
      'Snelle auto.svg',
      'Vuur.svg',
      'Zandloper.svg',
      'Zon.svg',
      'Zwaard.svg'
    ];

    iconFiles.sort((a, b) => a.localeCompare(b, 'nl'));

    const searchInput = document.getElementById('icon-search');
    const grid = document.getElementById('icon-grid');
    const emptyState = document.getElementById('empty-state');
    const countNode = document.getElementById('icon-count');
    const totalNode = document.getElementById('icon-total');
    const toast = document.getElementById('toast');

    totalNode.textContent = String(iconFiles.length);

    function toSrc(fileName) {
      return 'img/icons/' + encodeURIComponent(fileName);
    }

    function toLabel(fileName) {
      return fileName.replace(/\.svg$/i, '');
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('visible');
      window.setTimeout(() => toast.classList.remove('visible'), 1300);
    }

    function buildCard(fileName) {
      const button = document.createElement('button');
      button.className = 'icon-card';
      button.type = 'button';
      button.setAttribute('aria-label', 'Kopieer pad van ' + fileName);

      const preview = document.createElement('div');
      preview.className = 'icon-preview';

      const img = document.createElement('img');
      img.loading = 'lazy';
      img.src = toSrc(fileName);
      img.alt = toLabel(fileName);
      preview.appendChild(img);

      const label = document.createElement('div');
      label.className = 'icon-label';
      label.textContent = toLabel(fileName);

      const file = document.createElement('div');
      file.className = 'icon-file';
      file.textContent = fileName;

      button.append(preview, label, file);

      button.addEventListener('click', async () => {
        const iconPath = 'img/icons/' + fileName;
        try {
          await navigator.clipboard.writeText(iconPath);
          showToast('Pad gekopieerd: ' + iconPath);
        } catch {
          showToast('Kopieren niet toegestaan in deze browsercontext');
        }
      });

      return button;
    }

    function render() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = iconFiles.filter((fileName) => toLabel(fileName).toLowerCase().includes(query));

      grid.innerHTML = '';
      for (const fileName of filtered) {
        grid.appendChild(buildCard(fileName));
      }

      countNode.textContent = String(filtered.length);
      emptyState.style.display = filtered.length === 0 ? 'block' : 'none';
    }

    searchInput.addEventListener('input', render);
    render();
  </script>
  <script>
    (function () {
      const navLinks = document.querySelectorAll('[data-nav]');
      if (!navLinks.length) return;

      function getActiveKey() {
        const path = window.location.pathname.toLowerCase();
        if (path.endsWith('/design-system.html')) return 'design-system';
        if (path.endsWith('/icons.html')) return 'icons';
        if (path.endsWith('/shapes.html')) return 'shapes';
        if (path.endsWith('/examples.html')) return 'voorbeelden';
        return 'merkboek';
      }

      function updateActiveNav() {
        const activeKey = getActiveKey();
        navLinks.forEach(function (link) {
          const isActive = link.getAttribute('data-nav') === activeKey;
          link.classList.toggle('bg-light-grey/60', isActive);
          link.classList.toggle('text-dark-green', isActive);
          link.classList.toggle('font-semibold', isActive);
          if (isActive) {
            link.setAttribute('aria-current', 'page');
          } else {
            link.removeAttribute('aria-current');
          }
        });
      }

      updateActiveNav();
      window.addEventListener('hashchange', updateActiveNav);
    })();
  </script>
</body>
</html>
